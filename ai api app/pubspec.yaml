name: ai_api_classifier
description: AI API Defect Classifier - Batch image analysis with Gemini API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6

  # Network & API
  http: ^1.1.2

  # Image Handling
  file_picker: ^10.3.10

  # Local persistence
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
